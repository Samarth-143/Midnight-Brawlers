<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Midnight Brawlers</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0e0b16;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }
      #game-container canvas {
        display: block;
      }
      /* Ask touch users to rotate to landscape. */
      #rotate {
        display: none;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 100;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 18px;
          background: #0e0b16;
          color: #ede9f4;
          font-family: monospace;
          text-align: center;
          padding: 24px;
        }
        #rotate .phone {
          width: 64px;
          height: 104px;
          border: 4px solid #ff5ca8;
          border-radius: 12px;
          animation: rotate-hint 1.8s ease-in-out infinite;
        }
        #rotate p {
          margin: 0;
          font-size: 18px;
          letter-spacing: 0.5px;
        }
        #rotate small {
          color: #a99fc0;
        }
      }
      @keyframes rotate-hint {
        0%,
        40% {
          transform: rotate(0deg);
        }
        60%,
        100% {
          transform: rotate(-90deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate">
      <div class="phone"></div>
      <p>ROTATE YOUR DEVICE</p>
      <small>Midnight Brawlers plays in landscape</small>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
